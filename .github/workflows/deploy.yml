name: Deploy to Oracle VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ORACLE_VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_rsa \
          -p ${{ secrets.ORACLE_VPS_PORT }} \
          ${{ secrets.ORACLE_VPS_USER }}@${{ secrets.ORACLE_VPS_HOST }} << 'EOF'

          cd ~/Ananadeshwar_Events
          git pull origin main

          docker compose down || true
          docker compose up -d --build

          EOF