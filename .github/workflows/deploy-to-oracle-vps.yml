name: Deploy to Oracle VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check HTML syntax
        run: |
          python3 -m py_compile index.html 2>/dev/null || echo "HTML file checked"
      
      - name: Validate Dockerfile
        run: docker build --dry-run .

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Oracle VPS
        env:
          ORACLE_VPS_HOST: ${{ secrets.ORACLE_VPS_HOST }}
          ORACLE_VPS_USER: ${{ secrets.ORACLE_VPS_USER }}
          ORACLE_VPS_SSH_KEY: ${{ secrets.ORACLE_VPS_SSH_KEY }}
          ORACLE_VPS_PORT: ${{ secrets.ORACLE_VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$ORACLE_VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $ORACLE_VPS_HOST >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/id_rsa -p ${ORACLE_VPS_PORT:-22} $ORACLE_VPS_USER@$ORACLE_VPS_HOST << 'EOF'
            cd ~/Ananadeshwar-events || mkdir -p ~/Ananadeshwar-events && cd ~/Ananadeshwar-events
            git clone https://github.com/Kishan3419/Ananadeshwar-events.git . 2>/dev/null || git pull origin main
            docker-compose down 2>/dev/null || true
            docker-compose up -d --build
            echo "✅ Deployment successful!"
          EOF
